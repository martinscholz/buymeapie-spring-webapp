<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Buy Me a Pie</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app-shell">
    <aside class="sidebar">
      <section class="brand">
        <div class="logo">Pie</div>
        <div>
          <p class="eyebrow">Spring Boot Webapp</p>
          <h1>Buy Me a Pie</h1>
        </div>
      </section>

      <form id="create-list-form" class="create-list">
        <input id="new-list-name" type="text" autocomplete="off" placeholder="New list name" required>
        <button type="submit" title="Create list">+</button>
      </form>

      <nav id="list-nav" class="list-nav" aria-label="Shopping lists"></nav>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div>
          <p id="account-label" class="eyebrow">Connecting...</p>
          <h2 id="current-list-title">Shopping lists</h2>
        </div>
        <div class="top-actions">
          <button id="refresh-button" class="ghost-button" type="button">Refresh</button>
        </div>
      </header>

      <section class="summary-strip" aria-label="List summary">
        <article>
          <span id="summary-open">0</span>
          <p>Open</p>
        </article>
        <article>
          <span id="summary-done">0</span>
          <p>Purchased</p>
        </article>
        <article>
          <span id="summary-total">0</span>
          <p>Total</p>
        </article>
      </section>

      <section class="tool-row">
        <form id="add-item-form" class="add-item">
          <input id="item-title" list="unique-items" type="text" autocomplete="off" placeholder="Add milk, tomatoes, pasta..." required>
          <input id="item-amount" type="text" autocomplete="off" placeholder="Amount">
          <input id="item-group" list="group-suggestions" type="text" autocomplete="off" placeholder="Group">
          <button type="submit">Add</button>
        </form>
        <datalist id="unique-items"></datalist>
        <datalist id="group-suggestions"></datalist>
      </section>

      <section id="empty-state" class="empty-state">
        <h3>Select or create a list</h3>
        <p>Your lists, items, autocomplete dictionary, account status, and plan limits all live here.</p>
      </section>

      <section id="items-panel" class="items-panel" hidden>
        <div class="panel-toolbar">
          <div class="segmented-control" role="tablist" aria-label="Item filter">
            <button class="active" type="button" data-filter="all">All</button>
            <button type="button" data-filter="open">Open</button>
            <button type="button" data-filter="purchased">Purchased</button>
          </div>
          <input id="search-items" type="search" placeholder="Search items">
          <button id="assign-mode-button" class="ghost-button" type="button">Assign groups</button>
        </div>
        <div id="assignment-panel" class="assignment-panel" hidden>
          <label>
            <span>Target group</span>
            <select id="assignment-group"></select>
          </label>
          <p>Choose a group, then click Assign on any item.</p>
        </div>
        <div class="filter-grid" aria-label="Advanced item filters">
          <label>
            <span>Group</span>
            <select id="filter-group">
              <option value="">All groups</option>
            </select>
          </label>
          <button id="clear-filters" class="ghost-button" type="button">Clear</button>
        </div>
        <ul id="item-list" class="item-list"></ul>
      </section>
    </section>

  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/app.js" defer></script>
</body>
</html>
